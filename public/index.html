<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Realtime Chat App</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
</head>
<body>
  <div id="join-screen" class="overlay">
    <div class="join-box">
      <h2>チャットに参加</h2>
      <p style="font-size: 12px; color: #666; margin-bottom: 10px;">ボイスチャットにはマイクの許可が必要です</p>
      <input type="text" id="username-input" placeholder="名前を入力してください..." maxlength="15">
      <button id="join-btn">参加する</button>
    </div>
  </div>

  <div class="chat-container">
    <header>
      <h1><i class="fas fa-comments"></i> Chat App</h1>
      <div class="header-controls">
        <div id="voice-control" class="control-item">
          <button id="mic-btn" class="icon-btn muted" title="マイクのオン/オフ">
            <i class="fas fa-microphone-slash"></i>
          </button>
          <span class="control-label">ボイス</span>
        </div>
        <div id="tts-control" class="control-item">
          <label class="switch">
            <input type="checkbox" id="tts-toggle">
            <span class="slider round"></span>
          </label>
          <span class="tts-label"><i class="fas fa-volume-up"></i> 読み上げ</span>
        </div>
        <div id="user-count">
          <i class="fas fa-users"></i> <span id="online-count">0</span> 人
        </div>
      </div>
    </header>

    <main>
      <div id="sidebar">
        <h3>参加者リスト</h3>
        <ul id="users-list"></ul>
      </div>

      <div id="chat-window">
        <div id="messages"></div>
        <div id="typing-indicator"></div>
        <form id="chat-form">
          <input type="text" id="msg-input" placeholder="メッセージを入力..." autocomplete="off">
          <button type="submit"><i class="fas fa-paper-plane"></i></button>
        </form>
      </div>
    </main>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="main.js"></script>
</body>
</html>
