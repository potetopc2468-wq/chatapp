<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Realtime Chat App</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
</head>
<body>
  <div id="lobby-screen" class="overlay">
    <div class="lobby-box">
      <h2>チャットルーム選択</h2>
      <div class="input-group">
        <label>ニックネーム</label>
        <input type="text" id="username-input" placeholder="名前を入力..." maxlength="15">
      </div>
      <div class="input-group">
        <label>新しくルームを作る</label>
        <div class="create-room">
          <input type="text" id="new-room-input" placeholder="ルーム名..." maxlength="15">
          <button id="create-btn">作成</button>
        </div>
      </div>
      <div class="room-list-container">
        <label>公開ルーム一覧</label>
        <ul id="room-list">
          <li class="loading">ルームを探しています...</li>
        </ul>
      </div>
    </div>
  </div>

  <div class="chat-container" style="display: none;">
    <header>
      <div class="header-left">
        <button id="back-to-lobby" title="ロビーに戻る"><i class="fas fa-arrow-left"></i></button>
        <h1 id="current-room-name"><i class="fas fa-comments"></i> Chat App</h1>
      </div>
      <div class="header-controls">
        <div id="voice-control" class="control-item">
          <button id="mic-btn" class="icon-btn muted" title="マイクのオン/オフ">
            <i class="fas fa-microphone-slash"></i>
          </button>
          <span class="control-label">ボイス</span>
        </div>
        <div id="tts-control" class="control-item">
          <label class="switch">
            <input type="checkbox" id="tts-toggle">
            <span class="slider round"></span>
          </label>
          <span class="tts-label"><i class="fas fa-volume-up"></i> 読み上げ</span>
        </div>
        <div id="user-count">
          <i class="fas fa-users"></i> <span id="online-count">0</span> 人
        </div>
      </div>
    </header>

    <main>
      <div id="sidebar">
        <h3>参加者リスト</h3>
        <ul id="users-list"></ul>
      </div>

      <div id="chat-window">
        <div id="messages"></div>
        <div id="typing-indicator"></div>
        <form id="chat-form">
          <input type="text" id="msg-input" placeholder="メッセージを入力..." autocomplete="off">
          <button type="submit"><i class="fas fa-paper-plane"></i></button>
        </form>
      </div>
    </main>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="main.js"></script>
</body>
</html>
