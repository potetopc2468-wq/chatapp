<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Browser FPS Game</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; }
        #blocker {
            position: absolute; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.5);
            display: flex; justify-content: center; align-items: center;
            color: white; font-family: sans-serif; font-size: 24px; cursor: pointer;
            text-align: center;
        }
        #aim {
            position: absolute; width: 10px; height: 10px;
            background-color: red; border-radius: 50%;
            top: 50%; left: 50%; transform: translate(-50%, -50%);
            display: none; pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="blocker">
        <div>
            クリックしてプレイ開始<br><br>
            [W, A, S, D] : 移動<br>
            [マウス] : 視点移動<br>
            [Space] : ジャンプ<br>
            [左クリック] : 射撃
        </div>
    </div>
    <div id="aim"></div>
    <!-- Add import map to resolve bare module specifiers used by three.js addons -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
    <script type="module">
        import * as THREE from 'three';
        import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';

        let camera, scene, renderer, controls;
        const objects = [];
        const staticBoxes = [];
        
        let moveForward = false;
        let moveBackward = false;
        let moveLeft = false;
        let moveRight = false;
        let canJump = false;

        let isShooting = false;
        let lastShootTime = 0;
        const shootRate = 150; // 連射速度(ms)

        let prevTime = performance.now();
        const velocity = new THREE.Vector3();
        const direction = new THREE.Vector3();

        const bullets = [];

        init();
        animate();

        function init() {
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 1, 1000);
            camera.position.y = 10;

            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87ceeb);
            scene.fog = new THREE.Fog(0x87ceeb, 0, 750);

            const light = new THREE.HemisphereLight(0xeeeeff, 0x777788, 0.75);
            light.position.set(0.5, 1, 0.75);
            scene.add(light);

            controls = new PointerLockControls(camera, document.body);
            const blocker = document.getElementById('blocker');
            const aim = document.getElementById('aim');

            blocker.addEventListener('click', function () { controls.lock(); });
            controls.addEventListener('lock', function () { blocker.style.display = 'none'; aim.style.display = 'block'; });
            controls.addEventListener('unlock', function () { blocker.style.display = 'flex'; aim.style.display = 'none'; });
            scene.add(controls.getObject());

            const onKeyDown = function (event) {
                switch (event.code) {
                    case 'ArrowUp':
                    case 'KeyW': moveForward = true; break;
                    case 'ArrowLeft':
                    case 'KeyA': moveLeft = true; break;
                    case 'ArrowDown':
                    case 'KeyS': moveBackward = true; break;
                    case 'ArrowRight':
                    case 'KeyD': moveRight = true; break;
                    case 'Space': if (canJump === true) velocity.y += 350; canJump = false; break;
                }
            };
            const onKeyUp = function (event) {
                switch (event.code) {
                    case 'ArrowUp':
                    case 'KeyW': moveForward = false; break;
                    case 'ArrowLeft':
                    case 'KeyA': moveLeft = false; break;
                    case 'ArrowDown':
                    case 'KeyS': moveBackward = false; break;
                    case 'ArrowRight':
                    case 'KeyD': moveRight = false; break;
                }
            };
            document.addEventListener('keydown', onKeyDown);
            document.addEventListener('keyup', onKeyUp);
            
            document.addEventListener('mousedown', (e) => {
                if (controls.isLocked && e.button === 0) isShooting = true;
            });
            document.addEventListener('mouseup', (e) => {
                if (e.button === 0) isShooting = false;
            });

            // Floor
            const floorGeometry = new THREE.PlaneGeometry(2000, 2000, 100, 100);
            floorGeometry.rotateX(- Math.PI / 2);
            const floorMaterial = new THREE.MeshBasicMaterial({ color: 0x228B22 });
            const floor = new THREE.Mesh(floorGeometry, floorMaterial);
            scene.add(floor);

            // Objects (Obstacles / Targets)
            const boxGeometry = new THREE.BoxGeometry(20, 20, 20);
            for (let i = 0; i < 300; i++) {
                const boxMaterial = new THREE.MeshPhongMaterial({ specular: 0xffffff, flatShading: true, color: Math.random() * 0xffffff });
                const box = new THREE.Mesh(boxGeometry, boxMaterial);
                box.position.x = Math.floor(Math.random() * 20 - 10) * 20;
                box.position.y = Math.floor(Math.random() * 20) * 20 + 10;
                box.position.z = Math.floor(Math.random() * 20 - 10) * 20;
                scene.add(box);
                objects.push(box);
                box.updateMatrixWorld();
                staticBoxes.push(new THREE.Box3().setFromObject(box));
            }

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);
            window.addEventListener('resize', onWindowResize);
        }

        function shoot() {
            const bulletGeo = new THREE.SphereGeometry(1, 8, 8);
            const bulletMat = new THREE.MeshBasicMaterial({ color: 0xff0000 });
            const bullet = new THREE.Mesh(bulletGeo, bulletMat);
            
            bullet.position.copy(controls.getObject().position);
            scene.add(bullet);
            
            const direction = new THREE.Vector3(0, 0, -1).applyQuaternion(controls.getObject().quaternion);
            
            // speed of bullet
            bullets.push({ mesh: bullet, velocity: direction.multiplyScalar(10) });
            
            setTimeout(() => {
                scene.remove(bullet);
                const index = bullets.findIndex(b => b.mesh === bullet);
                if(index > -1) bullets.splice(index, 1);
            }, 2000);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);

            const time = performance.now();

            if (controls.isLocked === true) {
                const delta = (time - prevTime) / 1000;

                velocity.x -= velocity.x * 10.0 * delta;
                velocity.z -= velocity.z * 10.0 * delta;
                velocity.y -= 9.8 * 100.0 * delta; // falling

                direction.z = Number(moveForward) - Number(moveBackward);
                direction.x = Number(moveRight) - Number(moveLeft);
                direction.normalize();

                if (moveForward || moveBackward) velocity.z -= direction.z * 1200.0 * delta;
                if (moveLeft || moveRight) velocity.x -= direction.x * 1200.0 * delta;

                const pos = controls.getObject().position;
                const oldPos = pos.clone();

                controls.moveRight(- velocity.x * delta);
                controls.moveForward(- velocity.z * delta);
                const targetXZ = pos.clone();
                pos.copy(oldPos);

                const playerBox = new THREE.Box3();
                const setPlayerBox = (p) => {
                    // 足元が少し下になるようにBoundingBoxを設定 (幅10, 高さ20, 奥行10)
                    playerBox.setFromCenterAndSize(new THREE.Vector3(p.x, p.y - 10, p.z), new THREE.Vector3(8, 20, 8));
                };

                // Y軸(上下)の衝突判定
                let dy = velocity.y * delta;
                pos.y += dy;
                setPlayerBox(pos);
                let onObject = false;

                for (let i = 0; i < staticBoxes.length; i++) {
                    if (playerBox.intersectsBox(staticBoxes[i])) {
                        if (dy < 0) {
                            pos.y = staticBoxes[i].max.y + 20;
                            velocity.y = 0;
                            onObject = true;
                        } else if (dy > 0) {
                            pos.y = staticBoxes[i].min.y;
                            velocity.y = 0;
                        }
                        break;
                    }
                }

                // X軸の衝突判定
                pos.x = targetXZ.x;
                setPlayerBox(pos);
                for (let i = 0; i < staticBoxes.length; i++) {
                    if (playerBox.intersectsBox(staticBoxes[i])) {
                        pos.x = oldPos.x;
                        velocity.x = 0;
                        break;
                    }
                }

                // Z軸の衝突判定
                pos.z = targetXZ.z;
                setPlayerBox(pos);
                for (let i = 0; i < staticBoxes.length; i++) {
                    if (playerBox.intersectsBox(staticBoxes[i])) {
                        pos.z = oldPos.z;
                        velocity.z = 0;
                        break;
                    }
                }

                if (onObject) {
                    canJump = true;
                }

                if (pos.y < 10) {
                    velocity.y = 0;
                    pos.y = 10;
                    canJump = true;
                }
            }

            if (isShooting && time - lastShootTime > shootRate) {
                shoot();
                lastShootTime = time;
            }

            for (let i = bullets.length - 1; i >= 0; i--) {
                bullets[i].mesh.position.add(bullets[i].velocity);
                // Simple collision check with objects could go here
            }

            prevTime = time;
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
