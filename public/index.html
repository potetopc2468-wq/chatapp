<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Realtime Chat App</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.1/cropper.min.css">
  <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.1/cropper.min.js"></script>
</head>
<body>
  <!-- ログイン・新規登録画面 -->
  <div id="auth-screen" class="overlay">
    <div class="auth-box">
      <h2 id="auth-title">ログイン</h2>
      <div id="login-form">
        <input type="text" id="login-id" placeholder="ユーザーID" maxlength="15">
        <input type="password" id="login-pw" placeholder="パスワード">
        <button id="login-btn" class="primary-btn">ログイン</button>
        <p class="auth-switch">アカウントがない方は <a href="#" id="show-signup">新規登録</a></p>
      </div>
      <div id="signup-form" style="display: none;">
        <input type="text" id="signup-id" placeholder="希望のユーザーID" maxlength="15">
        <input type="text" id="signup-name" placeholder="表示名 (ニックネーム)" maxlength="15">
        <input type="password" id="signup-pw" placeholder="パスワード">
        <button id="signup-btn" class="primary-btn">新規登録</button>
        <p class="auth-switch">既にアカウントがある方は <a href="#" id="show-login">ログイン</a></p>
      </div>
    </div>
  </div>

  <!-- メインコンテナ -->
  <div id="app" style="display: none;">
    <main id="main-content">
      <!-- メインタブ (General/ルームチャット) -->
      <section id="tab-main" class="tab-panel active">
        <header>
          <div class="header-left">
            <button id="back-to-lobby" class="icon-btn" title="ルーム退出" style="display: none;"><i class="fas fa-arrow-left"></i></button>
            <h1 id="chat-title">メインチャット</h1>
          </div>
          <div class="header-voice-ui">
            <div id="voice-participants"></div>
            <div class="voice-buttons">
              <button id="join-voice-btn" class="voice-btn" title="ボイスチャットに参加"><i class="fas fa-phone"></i></button>
              <button id="mic-toggle-btn" class="voice-btn muted" style="display: none;" title="ミュート"><i class="fas fa-microphone-slash"></i></button>
            </div>
          </div>
        </header>
        <div id="messages-main" class="message-area"></div>
        <form class="chat-input-form">
          <input type="text" placeholder="メッセージを入力..." autocomplete="off">
          <button type="submit"><i class="fas fa-paper-plane"></i></button>
        </form>
      </section>

      <!-- グループタブ -->
      <section id="tab-group" class="tab-panel">
        <header>
          <h1><i class="fas fa-users"></i> グループ</h1>
          <button id="open-create-room" class="icon-btn"><i class="fas fa-plus"></i></button>
        </header>
        <div id="group-list" class="list-area"></div>
      </section>

      <!-- 個人チャットタブ -->
      <section id="tab-private" class="tab-panel">
        <header>
          <h1><i class="fas fa-user-friends"></i> 個人チャット</h1>
        </header>
        <div id="private-chat-list" class="list-area"></div>
      </section>

      <!-- プロフィールタブ -->
      <section id="tab-profile" class="tab-panel">
        <header>
          <h1><i class="fas fa-id-card"></i> プロフィール</h1>
        </header>
        <div class="profile-edit-area">
          <div class="avatar-edit">
            <img id="profile-avatar-preview" src="" alt="Avatar">
            <div class="avatar-controls">
              <button id="change-avatar-btn">ランダム生成</button>
              <label for="avatar-upload" class="upload-btn">画像をアップロード</label>
              <input type="file" id="avatar-upload" accept="image/*" style="display: none;">
            </div>
          </div>
          <div class="input-group">
            <label>ユーザーID (変更不可)</label>
            <input type="text" id="profile-id-display" disabled>
          </div>
          <div class="input-group">
            <label>名前</label>
            <input type="text" id="profile-name-input">
          </div>
          <div class="input-group">
            <label>自己紹介</label>
            <textarea id="profile-bio-input"></textarea>
          </div>
          <button id="save-profile-btn" class="primary-btn">保存する</button>
        </div>
      </section>
    </main>

    <!-- ボトムナビゲーション -->
    <nav id="bottom-nav">
      <button class="nav-item active" data-tab="main">
        <i class="fas fa-comments"></i>
        <span>メイン</span>
      </button>
      <button class="nav-item" data-tab="group">
        <i class="fas fa-layer-group"></i>
        <span>グループ</span>
      </button>
      <button class="nav-item" data-tab="private">
        <i class="fas fa-comment-dots"></i>
        <span>個人</span>
      </button>
      <button class="nav-item" data-tab="profile">
        <i class="fas fa-user-circle"></i>
        <span>設定</span>
      </button>
    </nav>
  </div>

  <!-- 画像切り抜きモーダル -->
  <div id="crop-modal" class="modal">
    <div class="modal-content crop-content">
      <h2>アイコンの切り抜き</h2>
      <div class="crop-container">
        <img id="crop-image" src="">
      </div>
      <div class="modal-buttons">
        <button id="cancel-crop">キャンセル</button>
        <button id="confirm-crop" class="primary-btn">切り抜く</button>
      </div>
    </div>
  </div>

  <!-- ルーム作成モーダル -->
  <div id="create-room-modal" class="modal">
    <div class="modal-content">
      <h2>新規グループ作成</h2>
      <input type="text" id="new-room-name" placeholder="グループ名を入力...">
      <div class="modal-buttons">
        <button id="close-modal">キャンセル</button>
        <button id="confirm-create-room" class="primary-btn">作成</button>
      </div>
    </div>
  </div>

  <!-- ユーザープロフィールモーダル -->
  <div id="user-profile-modal" class="modal">
    <div class="modal-content">
      <div class="user-info">
        <img id="modal-user-avatar" src="" alt="Avatar">
        <h2 id="modal-user-name"></h2>
        <p id="modal-user-bio"></p>
      </div>
      <div class="modal-buttons">
        <button id="close-profile-modal">閉じる</button>
        <button id="start-private-chat" class="primary-btn">メッセージを送る</button>
      </div>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="main.js"></script>
</body>
</html>
