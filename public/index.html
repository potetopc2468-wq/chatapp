<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Realtime Chat App</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
</head>
<body>
  <!-- メインコンテナ -->
  <div id="app">
    <!-- 各タブの画面 -->
    <main id="main-content">
      <!-- メインタブ (Generalチャット) -->
      <section id="tab-main" class="tab-panel active">
        <header>
          <h1><i class="fas fa-globe"></i> メインチャット</h1>
          <div class="header-voice-ui">
            <div id="voice-participants"></div>
            <div class="voice-buttons">
              <button id="join-voice-btn" class="voice-btn" title="ボイスチャットに参加"><i class="fas fa-phone"></i></button>
              <button id="mic-toggle-btn" class="voice-btn muted" style="display: none;" title="ミュート"><i class="fas fa-microphone-slash"></i></button>
            </div>
          </div>
        </header>
        <div id="messages-main" class="message-area"></div>
        <form class="chat-input-form" data-target="main">
          <input type="text" placeholder="メッセージを入力..." autocomplete="off">
          <button type="submit"><i class="fas fa-paper-plane"></i></button>
        </form>
      </section>

      <!-- グループタブ -->
      <section id="tab-group" class="tab-panel">
        <header>
          <h1><i class="fas fa-users"></i> グループ</h1>
          <button id="open-create-room" class="icon-btn"><i class="fas fa-plus"></i></button>
        </header>
        <div id="group-list" class="list-area"></div>
      </section>

      <!-- 個人チャットタブ -->
      <section id="tab-private" class="tab-panel">
        <header>
          <h1><i class="fas fa-user-friends"></i> 個人チャット</h1>
        </header>
        <div id="private-chat-list" class="list-area"></div>
      </section>

      <!-- プロフィールタブ -->
      <section id="tab-profile" class="tab-panel">
        <header>
          <h1><i class="fas fa-id-card"></i> プロフィール</h1>
        </header>
        <div class="profile-edit-area">
          <div class="avatar-edit">
            <img id="profile-avatar-preview" src="" alt="Avatar">
            <div class="avatar-controls">
              <button id="change-avatar-btn">ランダム生成</button>
              <label for="avatar-upload" class="upload-btn">画像をアップロード</label>
              <input type="file" id="avatar-upload" accept="image/*" style="display: none;">
            </div>
          </div>
          <div class="input-group">
            <label>名前</label>
            <input type="text" id="profile-name-input">
          </div>
          <div class="input-group">
            <label>自己紹介</label>
            <textarea id="profile-bio-input"></textarea>
          </div>
          <button id="save-profile-btn" class="primary-btn">保存する</button>
        </div>
      </section>
    </main>

    <!-- ボトムナビゲーション -->
    <nav id="bottom-nav">
      <button class="nav-item active" data-tab="main">
        <i class="fas fa-comments"></i>
        <span>メイン</span>
      </button>
      <button class="nav-item" data-tab="group">
        <i class="fas fa-layer-group"></i>
        <span>グループ</span>
      </button>
      <button class="nav-item" data-tab="private">
        <i class="fas fa-comment-dots"></i>
        <span>個人</span>
      </button>
      <button class="nav-item" data-tab="profile">
        <i class="fas fa-user-circle"></i>
        <span>設定</span>
      </button>
    </nav>
  </div>

  <!-- ルーム作成モーダル -->
  <div id="create-room-modal" class="modal">
    <div class="modal-content">
      <h2>新規グループ作成</h2>
      <input type="text" id="new-room-name" placeholder="グループ名を入力...">
      <div class="modal-buttons">
        <button id="close-modal">キャンセル</button>
        <button id="confirm-create-room" class="primary-btn">作成</button>
      </div>
    </div>
  </div>

  <!-- ユーザープロフィールモーダル -->
  <div id="user-profile-modal" class="modal">
    <div class="modal-content">
      <div class="user-info">
        <img id="modal-user-avatar" src="" alt="Avatar">
        <h2 id="modal-user-name"></h2>
        <p id="modal-user-bio"></p>
      </div>
      <div class="modal-buttons">
        <button id="close-profile-modal">閉じる</button>
        <button id="start-private-chat" class="primary-btn">メッセージを送る</button>
      </div>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="main.js"></script>
</body>
</html>
